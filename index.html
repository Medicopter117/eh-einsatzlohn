<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einsatzlohn // Schichtabrechner</title>
<style>
  :root{ --bg: #0b0f14; --panel: #131922; --panel-2: #0f141b; --line: #232c38; --text: #eef2f6; --muted: #7c8896; --fw: #e8583a; --pol: #3d7bf2; --sonst: #f2b705; --ok: #3ddc84; --accent: var(--pol); }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{ background: var(--bg); color:var(--text); font-family: sans-serif; min-height:100vh; padding:28px 18px 60px; }
  .wrap{max-width:1080px;margin:0 auto;}
  header{ display:flex;align-items:flex-end;justify-content:space-between; gap:16px;flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:18px;margin-bottom:26px; }
  h1{ font-weight:700; font-size:42px; margin:0;line-height:1; text-transform:uppercase; }
  h1 span{color:var(--accent);}
  .grid{ display:grid; grid-template-columns: 1.15fr 0.85fr; gap:24px; align-items:start; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:22px; }
  .section-label{ font-size:11px;letter-spacing:.14em;text-transform:uppercase; color:var(--muted);margin:0 0 12px; display:flex;align-items:center;gap:8px; }
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{ font-weight:600;font-size:14px; background:var(--panel-2); border:1px solid var(--line); color:var(--muted); padding:10px 16px;border-radius:7px;cursor:pointer; }
  .tab.active{border-color:var(--accent); color:var(--text); background:var(--line);}
  .jobs{ display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:24px; }
  .job-btn{ display:flex;align-items:center;justify-content:space-between;gap:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:13px 14px; cursor:pointer; color:var(--text); }
  .job-btn.selected{border-color:var(--accent);background:var(--line);}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field{display:flex;flex-direction:column;gap:7px;}
  .field.full{grid-column:1 / -1;}
  input{ background:var(--panel-2); border:1px solid var(--line); color:var(--text); font-size:16px; padding:11px 12px; border-radius:7px; width:100%; }
  .ticket{ background:var(--panel-2); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .ticket-stripe{ height:7px; background:var(--accent); }
  .ticket-body{padding:22px 22px 6px;}
  .ticket-row{ display:flex;justify-content:space-between; padding:7px 0; color:var(--muted); border-bottom:1px dashed var(--line); }
  .ticket-row b{color:var(--text);}
  .ticket-total{ padding:18px 22px 22px; }
  .amount{ font-weight:700; font-size:32px; color:var(--ok); }
  .formula{ font-size:12px; color:var(--muted); margin-top:8px; font-family: monospace; background: var(--bg); padding: 8px; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Einsatz<span id="titleAccent">lohn</span></h1>
    <div id="durationClock">Dauer: <b id="durationDisplay">00:00</b></div>
  </header>
  <div class="grid">
    <div class="panel">
      <p class="section-label">Kategorie</p>
      <div class="tabs" id="tabs">
        <button class="tab active" data-cat="feuerwehr">Feuerwehr</button>
        <button class="tab" data-cat="polizei">Polizei</button>
        <button class="tab" data-cat="sonstige">Sonstige</button>
      </div>
      <p class="section-label">Modus</p>
      <div class="tabs" id="modeTabs">
        <button class="tab active" data-mode="toEUR">XP → Geld</button>
        <button class="tab" data-mode="toXP">Geld → XP</button>
      </div>
      <p class="section-label">Job</p>
      <div class="jobs" id="jobs"></div>
      <div class="fields">
        <div class="field" id="fieldXp"><label>XP</label><input type="number" id="xp" value="0"></div>
        <div class="field" id="fieldZiel" style="display:none;"><label>Zielbetrag (€)</label><input type="number" id="ziel" value="0"></div>
        <div class="field" id="fieldCp"><label>CP (%)</label><input type="range" id="cp" min="0" max="100" value="100"></div>
        <div class="field full" id="fieldDuration"><label>Schichtdauer</label><div style="display:flex;gap:10px;"><input type="number" id="mins" value="0" placeholder="Min"><input type="number" id="secs" value="0" placeholder="Sek"></div></div>
      </div>
    </div>
    <div class="ticket">
      <div class="ticket-stripe" id="stripe"></div>
      <div class="ticket-body">
        <div class="ticket-row"><span id="ticketJob">Rettungsdienst</span><b id="ticketCat">FEUERWEHR</b></div>
        <div class="ticket-row" id="rowXpWrap"><span>XP</span><b id="rowXp">0</b></div>
        <div class="ticket-row" id="rowZielWrap" style="display:none;"><span>Zielbetrag</span><b id="rowZiel">0 €</b></div>
      </div>
      <div class="ticket-total">
        <div class="section-label" id="totalLabel">Gesamtauszahlung</div>
        <div class="amount" id="totalAmount">0,00 €</div>
        <div class="formula" id="formula"></div>
      </div>
    </div>
  </div>
</div>
<script>
const CATS = {
  feuerwehr: { jobs: [{name:'Rettungsdienst', mult:1.0}, {name:'Feuerwehr', mult:1.0}, {name:'Notarzt', mult:1.2}, {name:'Einsatzleiter', mult:1.3}] },
  polizei: { jobs: [{name:'Streife', mult:1.0}, {name:'Verkehrspolizei', mult:1.1}, {name:'SEK', mult:1.3}, {name:'Zivil', mult:1.2}] },
  sonstige: { jobs: [{name:'ADAC', mult:1.3}, {name:'Busfahrer', mult:1.2}, {name:'LKW-Fahrer', mult:1.2}] }
};
const COLORS = {feuerwehr:'#e8583a', polizei:'#3d7bf2', sonstige:'#f2b705'};
let state = { cat: 'feuerwehr', jobIndex: 0, mode: 'toEUR' };

function fmt(n) { return n.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

function calc() {
  const job = CATS[state.cat].jobs[state.jobIndex];
  const cp = (state.mode === 'toEUR') ? parseInt(document.getElementById('cp').value) / 100 : 1.0;
  
  document.getElementById('stripe').style.background = COLORS[state.cat];
  document.getElementById('titleAccent').style.color = COLORS[state.cat];

  if(state.mode === 'toEUR') {
    const xp = parseInt(document.getElementById('xp').value) || 0;
    const total = xp * 30 * job.mult * cp;
    document.getElementById('totalAmount').textContent = fmt(total) + ' €';
    document.getElementById('totalLabel').textContent = 'Gesamtauszahlung';
    document.getElementById('formula').innerHTML = `Rechnung: ${xp} XP × 30 × ${job.mult.toFixed(1)} (Mult) × ${cp.toFixed(2)} (CP)`;
  } else {
    const ziel = parseInt(document.getElementById('ziel').value) || 0;
    const rate = 30 * job.mult;
    const needed = rate > 0 ? Math.ceil(ziel / rate) : 0;
    document.getElementById('totalAmount').textContent = needed.toLocaleString('de-DE') + ' XP';
    document.getElementById('totalLabel').textContent = 'Benötigte XP';
    document.getElementById('formula').innerHTML = `Rechnung: ${ziel} € / (30 × ${job.mult.toFixed(1)} Mult)`;
  }
}

// Event-Listener etc. bleiben gleich, nur die calc() aufrufen
document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab'); if(!btn) return;
  state.cat = btn.dataset.cat; state.jobIndex = 0;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t === btn));
  renderJobs(); calc();
});

document.getElementById('modeTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab'); if(!btn) return;
  state.mode = btn.dataset.mode;
  document.querySelectorAll('#modeTabs .tab').forEach(t => t.classList.toggle('active', t === btn));
  document.getElementById('fieldXp').style.display = (state.mode === 'toEUR') ? 'flex' : 'none';
  document.getElementById('fieldZiel').style.display = (state.mode === 'toXP') ? 'flex' : 'none';
  document.getElementById('fieldCp').style.display = (state.mode === 'toEUR') ? 'flex' : 'none';
  calc();
});

function renderJobs() {
  const c = document.getElementById('jobs'); c.innerHTML = '';
  CATS[state.cat].jobs.forEach((j, i) => {
    const b = document.createElement('button');
    b.className = 'job-btn' + (i === state.jobIndex ? ' selected' : '');
    b.innerHTML = `<span>${j.name}</span><span>×${j.mult.toFixed(1)}</span>`;
    b.onclick = () => { state.jobIndex = i; renderJobs(); calc(); };
    c.appendChild(b);
  });
}

['xp','ziel','cp'].forEach(id => document.getElementById(id).addEventListener('input', calc));
renderJobs(); calc();
</script>
</body>
</html>
